# AI智能聊天互动系统配置文件

[database]
# 数据库主机地址
host = 127.0.0.1
# 数据库端口
port = 3306
# 数据库用户名
user = root
# 数据库密码
password =123456 
# 数据库名称
dbname = ai_chat_system

[ai]
# AI API地址
api_url = 
# AI API密钥
api_key = 
# AI默认昵称
default_nickname = AI助手
# AI默认语气（0:默认, 1:正式, 2:活泼）
default_tone = 0
# AI默认响应优先级（0:平衡, 1:速度优先, 2:质量优先）
default_priority = 0

[server]
# 服务器监听端口
port = 8080
# 线程池大小
thread_pool_size = 4
# 头像存储路径
avatar_storage_path = ./backend/static/avatars
